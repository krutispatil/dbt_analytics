version: 2

models:
  - name: stg_orders
    description: "Cleaned and renamed orders from Olist raw data"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer dimension — one row per customer_id"
    columns:
      - name: customer_id
        description: "Unique per order — not the true person identifier"
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "True person identifier — one person can have many customer_ids"
        tests:
          - not_null

  - name: stg_order_items
    description: "One row per item per order — an order with 3 items has 3 rows"
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to stg_products"
        tests:
          - not_null
      - name: seller_id
        description: "Foreign key to stg_sellers"
        tests:
          - not_null

  - name: stg_payments
    description: "Payment records — one order can have multiple rows"
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: payment_type
        description: "Method of payment"
        tests:
          - not_null
      - name: payment_value
        description: "Amount paid in this payment row"
        tests:
          - not_null

  - name: stg_products
    description: "Product dimension with corrected column names"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Seller dimension — one row per seller"
    columns:
      - name: seller_id
        description: "Unique seller identifier"
        tests:
          - unique
          - not_null
      - name: city
        tests:
          - not_null
      - name: state
        tests:
          - not_null

  - name: stg_reviews
    description: "Customer reviews — one row per review"
    columns:
      - name: review_id
        description: "Unique review identifier"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: review_score
        description: "Score from 1 to 5"
        tests:
          - not_null

  - name: stg_product_category_translations
    description: "Maps Portuguese category names to English"
    columns:
      - name: category_name
        tests:
          - unique
          - not_null
      - name: category_name_english
        tests:
          - not_null
