version: 2

models:
  - name: int_orders_enriched
    description: "One row per order — joins orders, customers, payments, and items into a single enriched record"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null
      - name: total_order_revenue
        tests:
          - not_null

  - name: int_customer_orders
    description: "One row per unique customer — lifetime metrics, segmentation, and order history"
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null

  - name: int_seller_performance
    description: "One row per seller — volume, revenue, delivery, and review metrics"
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
