# Project name — must match the 'name' field and folder references
name: 'my_pipeline'
version: '1.0.0'
config-version: 2

# This tells dbt which profile in profiles.yml to use for connecting to MotherDuck
profile: 'my_pipeline'

# File paths — tells dbt where to find each type of file
model-paths: ["models"]       # all your .sql model files live here
test-paths: ["tests"]         # custom tests live here
seed-paths: ["seeds"]         # CSV seed files live here
analysis-paths: ["analyses"]  # ad-hoc analysis SQL files live here
macro-paths: ["macros"]       # reusable SQL macros live here

# dbt build artifacts go here — never commit this folder to git
target-path: "target"

# These folders get wiped when you run dbt clean
clean-targets:
  - "target"
  - "dbt_packages"

# Materialization config — tells dbt HOW to build each layer in MotherDuck
# view = a virtual table, no storage cost, rebuilt every time it's queried
# table = a real table, stored in MotherDuck, faster for dashboards
models:
  my_pipeline:

    # Staging: views because they're lightweight and just clean raw data
    staging:
      +materialized: view

    # Intermediate: views because they're joining/enriching, not final output
    intermediate:
      +materialized: view

    # Marts: tables because Tableau/Power BI will query these repeatedly
    # storing as tables makes dashboard queries much faster
    marts:
      +materialized: table